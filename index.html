<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today's Message from the Word</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('master.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    /* Subtle gradient at bottom to keep text readable */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 40%,
        rgba(0, 0, 0, 0.45) 100%
      );
    }

    .content {
      position: fixed;
      bottom: 72px;
      left: 60px;
      right: 60px;
      z-index: 10;
      color: #ffffff;
    }

    #message-title {
      font-family: 'Inter', Arial Black, Helvetica Neue, sans-serif;
      font-size: 54px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    #message-scripture {
      font-family: 'Inter', Arial Black, Helvetica Neue, sans-serif;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.2px;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <div id="message-title"><!-- TITLE_START -->Our Faith Gets Tested<!-- TITLE_END --></div>
    <div id="message-scripture"><!-- SCRIPTURE_START -->James 1:2-4, 12-18<!-- SCRIPTURE_END --></div>
  </div>
</body>
</html>
